# Server
server.port=5000

# App name
spring.application.name=ccms-backend

# MongoDB — reads from environment variable in Docker, falls back to local
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/ccms_db}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:ccms_db}

# JWT
app.jwt.secret=${APP_JWT_SECRET:ccms_super_secret_jwt_key_2025_spring_boot_mongodb}
app.jwt.expiration=${APP_JWT_EXPIRATION:604800000}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.ccms=INFO